<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Desk Setup - GSpaces Admin</title>
    <link href="{{ url_for('static', filename='img/favicon.svg') }}" rel="icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            padding: 40px 0;
        }
        .container {
            max-width: 800px;
        }
        .form-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            padding: 40px;
        }
        .form-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            text-align: center;
        }
        .form-label {
            font-weight: 600;
            color: #374151;
            margin-bottom: 8px;
        }
        .form-control, .form-select {
            border-radius: 10px;
            border: 2px solid #e5e7eb;
            padding: 12px 15px;
        }
        .form-control:focus, .form-select:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        .sub-image-entry {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 15px;
            border: 2px dashed #dee2e6;
        }
        .btn-add-sub {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            border: none;
            color: white;
            padding: 12px 30px;
            border-radius: 10px;
            font-weight: 600;
        }
        .btn-add-sub:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(16, 185, 129, 0.3);
        }
        .btn-remove {
            background: #ef4444;
            border: none;
            color: white;
            padding: 8px 20px;
            border-radius: 8px;
        }
        .btn-submit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            padding: 15px 40px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 1.1rem;
            width: 100%;
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
        }
        .section-divider {
            border-top: 2px solid #e5e7eb;
            margin: 30px 0;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="form-card">
            <div class="form-header">
                <h1 class="mb-2"><i class="bi bi-plus-circle"></i> Add New Desk Setup</h1>
                <p class="mb-0">Create a new desk setup product for your catalog</p>
            </div>

            <form action="{{ url_for('add_product') }}" method="POST" enctype="multipart/form-data">
                
                <!-- Basic Information -->
                <div class="mb-4">
                    <label class="form-label">Setup Name *</label>
                    <input type="text" name="name" class="form-control" placeholder="e.g., Warm Wood, Semi Wood" required>
                </div>

                <div class="mb-4">
                    <label class="form-label">Category *</label>
                    <select name="category" class="form-select" required>
                        <option value="">Select Category</option>
                        <option value="Basic">Basic</option>
                        <option value="Couple">Couple</option>
                        <option value="Elegant">Elegant</option>
                        <option value="Greenery">Greenery</option>
                        <option value="Luxury">Luxury</option>
                        <option value="Storage">Storage</option>
                        <option value="Studio">Studio</option>
                    </select>
                </div>

                <div class="mb-4">
                    <label class="form-label">Price (₹) *</label>
                    <input type="number" step="0.01" name="price" class="form-control" placeholder="25000.00" required>
                </div>

                <!-- Hidden rating field with default value -->
                <input type="hidden" name="rating" value="5">

                <div class="mb-4">
                    <label class="form-label">Description *</label>
                    <textarea name="description" class="form-control" rows="4" placeholder="Describe the desk setup features, materials, and what's included..." required></textarea>
                </div>

                <div class="mb-4">
                    <label class="form-label">Main Image *</label>
                    <input type="file" name="images" class="form-control" accept="image/*" required>
                    <small class="text-muted">This will be the primary image shown in the catalog</small>
                </div>

                <div class="section-divider"></div>

                <!-- Sub Images Section -->
                <h4 class="mb-3"><i class="bi bi-images"></i> Additional Images</h4>
                <p class="text-muted mb-3">Add multiple images with descriptions to showcase different angles and details</p>

                <div id="subImagesContainer">
                    <div class="sub-image-entry">
                        <div class="mb-3">
                            <label class="form-label">Sub Image</label>
                            <input type="file" name="sub_images[]" class="form-control" accept="image/*">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Image Description</label>
                            <input type="text" name="sub_descriptions[]" class="form-control" placeholder="e.g., Side view, Close-up of desk surface">
                        </div>

                        <button type="button" class="btn btn-remove remove-sub-image">
                            <i class="bi bi-trash"></i> Remove
                        </button>
                    </div>
                </div>

                <button type="button" id="addSubImageButton" class="btn btn-add-sub mb-4">
                    <i class="bi bi-plus-circle"></i> Add Another Image
                </button>

                <div class="section-divider"></div>

                <button type="submit" class="btn btn-submit">
                    <i class="bi bi-check-circle"></i> Add Setup to Catalog
                </button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const addSubImageButton = document.getElementById('addSubImageButton');
            const subImagesContainer = document.getElementById('subImagesContainer');

            addSubImageButton.addEventListener('click', function () {
                const newEntry = document.createElement('div');
                newEntry.classList.add('sub-image-entry');
                newEntry.innerHTML = `
                    <div class="mb-3">
                        <label class="form-label">Sub Image</label>
                        <input type="file" name="sub_images[]" class="form-control" accept="image/*">
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Image Description</label>
                        <input type="text" name="sub_descriptions[]" class="form-control" placeholder="e.g., Side view, Close-up of desk surface">
                    </div>

                    <button type="button" class="btn btn-remove remove-sub-image">
                        <i class="bi bi-trash"></i> Remove
                    </button>
                `;
                subImagesContainer.appendChild(newEntry);
            });

            subImagesContainer.addEventListener('click', function (e) {
                if (e.target.classList.contains('remove-sub-image') || e.target.closest('.remove-sub-image')) {
                    e.target.closest('.sub-image-entry').remove();
                }
            });
        });
    </script>
</body>
</html>
