<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deals & Promotions - GSpaces Admin</title>
    <link href="{{ url_for('static', filename='img/favicon.svg') }}" rel="icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/main.css') }}" rel="stylesheet">
    <style>
        body {
            background: #f8f9fa;
            min-height: 100vh;
        }
        
        .admin-card {
            background: #fff;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 0;
            margin-bottom: 24px;
            overflow: hidden;
        }
        
        .card-header-custom {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 32px;
            color: white;
            border-bottom: 4px solid #d4af37;
        }
        
        .card-header-custom h2 {
            margin: 0;
            font-size: 2rem;
            font-weight: 700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        .card-header-custom p {
            margin: 8px 0 0;
            opacity: 0.95;
            font-size: 1.1rem;
        }
        
        .nav-tabs {
            background: #f8f9fa;
            padding: 16px 32px 0;
            border-bottom: 3px solid #e5e7eb;
            margin: 0;
        }
        
        .nav-tabs .nav-link {
            color: #6b7280;
            font-weight: 600;
            border: none;
            padding: 14px 28px;
            margin-right: 8px;
            border-radius: 12px 12px 0 0;
            transition: all 0.3s ease;
            font-size: 1.05rem;
            position: relative;
        }
        
        .nav-tabs .nav-link:hover:not(.active) {
            background: #e5e7eb;
            transform: translateY(-2px);
        }
        
        .nav-tabs .nav-link.active {
            background: linear-gradient(135deg, #d4af37 0%, #f4d03f 100%);
            color: #111827;
            box-shadow: 0 4px 12px rgba(212, 175, 55, 0.4);
            transform: translateY(-2px);
        }
        
        .nav-tabs .nav-link.active::after {
            content: '';
            position: absolute;
            bottom: -3px;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(135deg, #d4af37 0%, #f4d03f 100%);
        }
        
        #contentArea {
            padding: 32px;
            min-height: 500px;
            background: white;
        }
        
        .spinner-border {
            width: 3rem;
            height: 3rem;
            border-width: 0.3rem;
        }
    </style>
</head>
<body>
    {% include 'navbar.html' %}

    <div class="container-fluid" style="margin-top: 76px;">
        <div class="row g-0">
            <!-- Sidebar -->
            <div class="col-md-2">
                {% set active_page = 'deals_promotions' %}
                {% include 'admin_sidebar.html' %}
            </div>

            <!-- Main Content -->
            <div class="col-md-10" style="background: #f8f9fa; min-height: calc(100vh - 76px); padding: 24px; overflow-x: hidden;">
                <div class="admin-card" style="max-width: 100%; overflow-x: auto;">
                    <div class="card-header-custom">
                        <h2>🎁 Deals & Promotions</h2>
                        <p>Manage coupons, referral programs, and special deals</p>
                    </div>

                    <!-- Tabs Navigation -->
                    <ul class="nav nav-tabs mb-4" role="tablist">
                        <li class="nav-item" role="presentation">
                            <button class="nav-link active" onclick="loadContent('{{ url_for('admin_coupons') }}', this)">
                                🎫 Coupons
                            </button>
                        </li>
                        <li class="nav-item" role="presentation">
                            <button class="nav-link" onclick="loadContent('{{ url_for('admin_referral_coupons') }}', this)">
                                🎯 Referral Coupons
                            </button>
                        </li>
                        <li class="nav-item" role="presentation">
                            <button class="nav-link" onclick="loadContent('{{ url_for('admin_deals') }}', this)">
                                🔥 Deals
                            </button>
                        </li>
                    </ul>

                    <!-- Content Area -->
                    <div id="contentArea">
                        <div class="text-center py-5">
                            <div class="spinner-border text-primary" role="status">
                                <span class="visually-hidden">Loading...</span>
                            </div>
                            <p class="mt-3">Loading content...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    {% include 'footer.html' %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function loadContent(url, button) {
            // Update active tab
            document.querySelectorAll('.nav-link').forEach(btn => btn.classList.remove('active'));
            button.classList.add('active');
            
            // Show loading
            document.getElementById('contentArea').innerHTML = `
                <div class="text-center py-5">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                    <p class="mt-3">Loading content...</p>
                </div>
            `;
            
            // Fetch content
            fetch(url)
                .then(response => response.text())
                .then(html => {
                    // Parse the HTML
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(html, 'text/html');
                    
                    // Try multiple selectors to find the main content
                    let mainContent = doc.querySelector('.admin-container');
                    
                    if (!mainContent) {
                        // Try to get content from col-md-10 (main content area)
                        const colMd10 = doc.querySelector('.col-md-10');
                        if (colMd10) {
                            // Get all direct children except alerts
                            mainContent = document.createElement('div');
                            Array.from(colMd10.children).forEach(child => {
                                if (!child.classList.contains('mb-4') || child.querySelector('.admin-card')) {
                                    mainContent.appendChild(child.cloneNode(true));
                                }
                            });
                        }
                    }
                    
                    if (!mainContent) {
                        mainContent = doc.querySelector('.admin-card');
                    }
                    
                    if (!mainContent) {
                        // Last resort: get body content
                        mainContent = doc.body;
                    }
                    
                    // Display content
                    if (mainContent) {
                        document.getElementById('contentArea').innerHTML = mainContent.innerHTML;
                    } else {
                        document.getElementById('contentArea').innerHTML = '<div class="alert alert-warning">Could not load content. Please refresh the page.</div>';
                    }
                    
                    // Re-execute any scripts in the loaded content
                    const scripts = document.getElementById('contentArea').querySelectorAll('script');
                    scripts.forEach(script => {
                        const newScript = document.createElement('script');
                        newScript.textContent = script.textContent;
                        document.body.appendChild(newScript);
                    });
                })
                .catch(error => {
                    document.getElementById('contentArea').innerHTML = `
                        <div class="alert alert-danger">
                            <i class="fas fa-exclamation-triangle"></i> Error loading content: ${error.message}
                        </div>
                    `;
                });
        }
        
        // Load first tab on page load
        window.addEventListener('load', function() {
            const firstTab = document.querySelector('.nav-link.active');
            if (firstTab) {
                loadContent(firstTab.getAttribute('onclick').match(/'([^']+)'/)[1], firstTab);
            }
        });
    </script>
</body>
</html>
