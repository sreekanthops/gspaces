<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users Management - GSpaces Admin</title>
    <link href="{{ url_for('static', filename='img/favicon.svg') }}" rel="icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/main.css') }}" rel="stylesheet">
    <style>
        body {
            background: #f7f8fc;
        }
        .admin-card {
            background: #fff;
            border-radius: 24px;
            box-shadow: 0 18px 40px rgba(17, 24, 39, 0.08);
            padding: 32px;
            margin-bottom: 24px;
        }
        .nav-tabs .nav-link {
            color: #6b7280;
            font-weight: 600;
            border: none;
            padding: 12px 24px;
            margin-right: 8px;
            border-radius: 12px 12px 0 0;
        }
        .nav-tabs .nav-link.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .nav-tabs .nav-link:hover:not(.active) {
            background: #f3f4f6;
        }
    </style>
</head>
<body>
    {% include 'navbar.html' %}

    <div class="container-fluid" style="margin-top: 76px;">
        <div class="row g-0">
            <!-- Sidebar -->
            <div class="col-md-2">
                {% set active_page = 'users_management' %}
                {% include 'admin_sidebar.html' %}
            </div>

            <!-- Main Content -->
            <div class="col-md-10" style="background: #f8f9fa; min-height: calc(100vh - 76px); padding: 24px; border-radius: 16px;">
                <div class="admin-card">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <div>
                            <h2 class="mb-2">👥 Users Management</h2>
                            <p class="text-muted mb-0">Manage customers and admin users</p>
                        </div>
                    </div>

                    <!-- Tabs Navigation -->
                    <ul class="nav nav-tabs mb-4" role="tablist">
                        <li class="nav-item" role="presentation">
                            <button class="nav-link active" onclick="loadContent('{{ url_for('admin_customers') }}', this)">
                                👤 Customers
                            </button>
                        </li>
                        <li class="nav-item" role="presentation">
                            <button class="nav-link" onclick="loadContent('{{ url_for('admin_users.manage_users') }}', this)">
                                👨‍💼 Admin Users
                            </button>
                        </li>
                    </ul>

                    <!-- Content Area -->
                    <div id="contentArea">
                        <div class="text-center py-5">
                            <div class="spinner-border text-primary" role="status">
                                <span class="visually-hidden">Loading...</span>
                            </div>
                            <p class="mt-3">Loading content...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    {% include 'footer.html' %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function loadContent(url, button) {
            // Update active tab
            document.querySelectorAll('.nav-link').forEach(btn => btn.classList.remove('active'));
            button.classList.add('active');
            
            // Show loading
            document.getElementById('contentArea').innerHTML = `
                <div class="text-center py-5">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                    <p class="mt-3">Loading content...</p>
                </div>
            `;
            
            // Fetch content
            fetch(url)
                .then(response => response.text())
                .then(html => {
                    // Parse the HTML
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(html, 'text/html');
                    
                    // Extract main content (skip navbar, sidebar, footer)
                    const mainContent = doc.querySelector('.col-md-10') || doc.querySelector('.admin-card') || doc.body;
                    
                    // Display content
                    document.getElementById('contentArea').innerHTML = mainContent.innerHTML;
                    
                    // Re-execute any scripts in the loaded content
                    const scripts = document.getElementById('contentArea').querySelectorAll('script');
                    scripts.forEach(script => {
                        const newScript = document.createElement('script');
                        newScript.textContent = script.textContent;
                        document.body.appendChild(newScript);
                    });
                })
                .catch(error => {
                    document.getElementById('contentArea').innerHTML = `
                        <div class="alert alert-danger">
                            <i class="fas fa-exclamation-triangle"></i> Error loading content: ${error.message}
                        </div>
                    `;
                });
        }
        
        // Load first tab on page load
        window.addEventListener('load', function() {
            const firstTab = document.querySelector('.nav-link.active');
            if (firstTab) {
                loadContent(firstTab.getAttribute('onclick').match(/'([^']+)'/)[1], firstTab);
            }
        });
    </script>
</body>
</html>
