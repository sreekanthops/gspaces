<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deals & Promotions - GSpaces Admin</title>
    <link href="{{ url_for('static', filename='img/favicon.svg') }}" rel="icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/main.css') }}" rel="stylesheet">
    <style>
        body {
            background: #f7f8fc;
        }
        .admin-card {
            background: #fff;
            border-radius: 24px;
            box-shadow: 0 18px 40px rgba(17, 24, 39, 0.08);
            padding: 32px;
            margin-bottom: 24px;
        }
        .nav-tabs .nav-link {
            color: #6b7280;
            font-weight: 600;
            border: none;
            padding: 12px 24px;
            margin-right: 8px;
            border-radius: 12px 12px 0 0;
        }
        .nav-tabs .nav-link.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .nav-tabs .nav-link:hover:not(.active) {
            background: #f3f4f6;
        }
        .tab-content {
            padding: 24px 0;
        }
        iframe {
            border: none;
            width: 100%;
            min-height: 800px;
        }
    </style>
</head>
<body>
    {% include 'navbar.html' %}

    <div class="container-fluid" style="margin-top: 76px;">
        <div class="row g-0">
            <!-- Sidebar -->
            <div class="col-md-2">
                {% set active_page = 'deals_promotions' %}
                {% include 'admin_sidebar.html' %}
            </div>

            <!-- Main Content -->
            <div class="col-md-10" style="background: #f8f9fa; min-height: calc(100vh - 76px); padding: 24px; border-radius: 16px;">
                <div class="admin-card">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <div>
                            <h2 class="mb-2">🎁 Deals & Promotions</h2>
                            <p class="text-muted mb-0">Manage coupons, referral programs, and special deals</p>
                        </div>
                    </div>

                    <!-- Tabs Navigation -->
                    <ul class="nav nav-tabs" id="dealsTab" role="tablist">
                        <li class="nav-item" role="presentation">
                            <button class="nav-link active" id="coupons-tab" data-bs-toggle="tab" data-bs-target="#coupons" type="button" role="tab">
                                🎫 Coupons
                            </button>
                        </li>
                        <li class="nav-item" role="presentation">
                            <button class="nav-link" id="referral-tab" data-bs-toggle="tab" data-bs-target="#referral" type="button" role="tab">
                                🎯 Referral Coupons
                            </button>
                        </li>
                        <li class="nav-item" role="presentation">
                            <button class="nav-link" id="deals-tab" data-bs-toggle="tab" data-bs-target="#deals" type="button" role="tab">
                                🔥 Deals
                            </button>
                        </li>
                    </ul>

                    <!-- Tabs Content -->
                    <div class="tab-content" id="dealsTabContent">
                        <!-- Coupons Tab -->
                        <div class="tab-pane fade show active" id="coupons" role="tabpanel">
                            <iframe src="{{ url_for('admin_coupons') }}" id="couponsFrame"></iframe>
                        </div>

                        <!-- Referral Coupons Tab -->
                        <div class="tab-pane fade" id="referral" role="tabpanel">
                            <iframe src="{{ url_for('admin_referral_coupons') }}" id="referralFrame"></iframe>
                        </div>

                        <!-- Deals Tab -->
                        <div class="tab-pane fade" id="deals" role="tabpanel">
                            <iframe src="{{ url_for('admin_deals') }}" id="dealsFrame"></iframe>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    {% include 'footer.html' %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Auto-adjust iframe heights
        function adjustIframeHeight(iframe) {
            try {
                iframe.style.height = iframe.contentWindow.document.body.scrollHeight + 'px';
            } catch(e) {
                // Cross-origin, use default height
                iframe.style.height = '800px';
            }
        }

        // Adjust heights when tabs are shown
        document.querySelectorAll('button[data-bs-toggle="tab"]').forEach(tab => {
            tab.addEventListener('shown.bs.tab', function (event) {
                const targetId = event.target.getAttribute('data-bs-target');
                const iframe = document.querySelector(targetId + ' iframe');
                if (iframe) {
                    adjustIframeHeight(iframe);
                }
            });
        });

        // Initial adjustment
        window.addEventListener('load', function() {
            document.querySelectorAll('iframe').forEach(adjustIframeHeight);
        });
    </script>
</body>
</html>
